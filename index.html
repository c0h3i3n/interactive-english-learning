<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔮 霍格華茲單字魔法書</title>
  <style>
    /* ================================================================
       全域重置 & 哈利波特魔法風格基礎樣式
       靈感來自：霍格華茲城堡、魔藥學課本、飛天掃帚、分類帽
       ================================================================ */

    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      /* 深色星空魔法背景 — 像霍格華茲大廳天花板 */
      background: #0a0a14;
      background-image:
        radial-gradient(ellipse at 50% 0%, rgba(60, 30, 100, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 80%, rgba(20, 40, 100, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(100, 40, 60, 0.12) 0%, transparent 50%);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #e8e0f0;
      padding: 20px;
      overflow-x: hidden;
    }

    /* ===== 飄浮魔法粒子（星星 ✨） ===== */
    .magic-particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #f0e6a0;
      border-radius: 50%;
      box-shadow: 0 0 6px 2px rgba(240, 230, 160, 0.3);
      animation: floatParticle linear infinite;
      opacity: 0;
    }

    @keyframes floatParticle {
      0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.7; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* ===== 主要容器 — 像一本魔法書 ===== */
    .container {
      width: 100%;
      max-width: 520px;
      background: rgba(18, 16, 30, 0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(200, 180, 140, 0.12);
      border-radius: 28px;
      padding: 32px 28px;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(240, 220, 180, 0.05);
      position: relative;
      z-index: 1;
    }

    /* 書本頂部金色裝飾線 */
    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 8%;
      right: 8%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.4), rgba(180, 140, 60, 0.6), rgba(212, 175, 55, 0.4), transparent);
      border-radius: 2px;
    }

    /* 書角裝飾（左上 + 右上） */
    .container::after {
      content: '✦';
      position: absolute;
      top: 12px;
      right: 20px;
      font-size: 14px;
      color: rgba(212, 175, 55, 0.25);
    }

    /* 左上角星星裝飾 */
    .corner-star {
      position: absolute;
      top: 10px;
      left: 20px;
      font-size: 14px;
      color: rgba(212, 175, 55, 0.25);
      z-index: 0;
    }

    /* ===== 頂部區域：魔法標題 + 分類帽（下拉選單） ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
      position: relative;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #f0e6a0, #d4af37, #b8942e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(212, 175, 55, 0.15);
    }

    /* ===== 自訂分類帽（下拉選單） ===== */
    .vocab-selector {
      position: relative;
    }

    .vocab-selector select {
      appearance: none;
      -webkit-appearance: none;
      background: rgba(60, 40, 80, 0.4);
      border: 1px solid rgba(212, 175, 55, 0.15);
      color: #d0c8e0;
      padding: 9px 38px 9px 16px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      outline: none;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .vocab-selector select:hover {
      border-color: rgba(212, 175, 55, 0.4);
      background: rgba(60, 40, 80, 0.6);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.08);
    }

    .vocab-selector::after {
      content: '⚡';
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(212, 175, 55, 0.5);
      pointer-events: none;
      font-size: 13px;
    }

    /* ===== 進度條 — 像魔藥學的溫度計 ===== */
    .progress-section {
      margin-bottom: 26px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #8880a8;
      margin-bottom: 8px;
    }

    .progress-header .progress-label {
      font-weight: 500;
    }

    .progress-header .progress-percent {
      font-weight: 700;
      color: #f0e6a0;
      font-family: 'Playfair Display', serif;
      font-size: 15px;
    }

    .progress-track {
      width: 100%;
      height: 7px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid rgba(212, 175, 55, 0.06);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, #d4af37, #f0e6a0, #d4af37);
      background-size: 200% 100%;
      animation: shimmer 2.5s ease-in-out infinite;
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 0%; }
      50%      { background-position: 100% 0%; }
    }

    /* ===== 單字卡片 — 像活米村的巫師卡片 ===== */
    .card-wrapper {
      perspective: 1200px;
      margin-bottom: 20px;
      position: relative;
    }

    /* 卡片周圍的魔法光暈（當卡片翻轉時） */
    .card-wrapper::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.05), rgba(160, 120, 200, 0.05), rgba(212, 175, 55, 0.05));
      opacity: 0;
      transition: opacity 0.6s;
      pointer-events: none;
      z-index: -1;
    }

    .card-wrapper.glowing::before {
      opacity: 1;
    }

    .card {
      position: relative;
      width: 100%;
      padding-bottom: 70%;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    /* 卡片正反面共用樣式 — 羊皮紙魔法風格 */
    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 24px;
      padding: 28px 20px;
      /* 像老舊羊皮紙 + 魔法氛圍 */
      background: linear-gradient(160deg, rgba(28, 24, 48, 0.95), rgba(20, 16, 36, 0.98));
      border: 1px solid rgba(200, 180, 140, 0.08);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(240, 220, 180, 0.04),
        inset 0 -1px 0 rgba(0, 0, 0, 0.2);
      text-align: center;
      overflow: hidden;
    }

    /* 卡片表面的微紋理 */
    .card-face::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 20%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 70% 80%, rgba(160, 120, 200, 0.03) 0%, transparent 50%);
      pointer-events: none;
    }

    .card-back {
      transform: rotateY(180deg);
    }

    /* 類別標籤（像課本分類） */
    .card-lang-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(212, 175, 55, 0.5);
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    /* 分類標籤左邊的小閃電 */
    .card-lang-tag::before {
      content: '⚡ ';
    }

    /* 主文字（英文／中文） */
    .card-word {
      font-family: 'Playfair Display', serif;
      font-size: clamp(30px, 7vw, 40px);
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 6px;
      position: relative;
      z-index: 1;
    }

    .card-word.en {
      color: #f0eae8;
      letter-spacing: 0.5px;
      text-shadow: 0 0 30px rgba(240, 230, 160, 0.06);
    }

    .card-word.zh {
      color: #d4af37;
      font-size: clamp(26px, 6vw, 34px);
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.08);
    }

    /* 單字小提示（例句或分類） */
    .card-hint {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.18);
      margin-top: 10px;
      position: relative;
      z-index: 1;
    }

    /* ===== 語音按鈕（小喇叭）— 像現影術 ===== */
    .speak-btn {
      position: absolute;
      bottom: 16px;
      right: 20px;
      background: rgba(60, 40, 80, 0.5);
      border: 1px solid rgba(212, 175, 55, 0.12);
      color: rgba(212, 175, 55, 0.6);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.3s;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    .speak-btn:hover {
      background: rgba(212, 175, 55, 0.12);
      border-color: rgba(212, 175, 55, 0.3);
      color: #f0e6a0;
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.12);
    }

    .speak-btn:active {
      transform: scale(0.92);
    }

    /* 語音播放時脈衝動畫 */
    .speak-btn.speaking {
      animation: pulseSpeak 0.6s ease-in-out infinite;
      border-color: rgba(212, 175, 55, 0.5);
      color: #f0e6a0;
    }

    @keyframes pulseSpeak {
      0%, 100% { box-shadow: 0 0 10px rgba(212, 175, 55, 0.15); }
      50%      { box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
    }

    /* ===== 翻頁提示文字 ===== */
    .tap-hint {
      text-align: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.12);
      margin-bottom: 18px;
      letter-spacing: 0.5px;
    }

    /* ===== 咒語按鈕組（認識／不認識）= 像施展魔法 ===== */
    .action-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
    }

    .action-buttons button {
      flex: 1;
      padding: 14px 0;
      border: none;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* 按鈕底部的微光效果 */
    .action-buttons button::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20%;
      right: 20%;
      height: 2px;
      border-radius: 2px;
      opacity: 0.3;
      transition: opacity 0.3s;
    }

    /* 「學會了！」— 葛來分多金紅色調 */
    .btn-know {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.10), rgba(180, 140, 60, 0.06));
      color: #f0e6a0;
      border: 1px solid rgba(212, 175, 55, 0.10);
    }

    .btn-know::after {
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
    }

    .btn-know:hover {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.18), rgba(180, 140, 60, 0.12));
      border-color: rgba(212, 175, 55, 0.25);
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(212, 175, 55, 0.10);
    }

    /* 「再練練！」— 史萊哲林綠色調 */
    .btn-dont-know {
      background: linear-gradient(135deg, rgba(60, 180, 120, 0.08), rgba(40, 140, 90, 0.05));
      color: #80d0b0;
      border: 1px solid rgba(60, 180, 120, 0.08);
    }

    .btn-dont-know::after {
      background: linear-gradient(90deg, transparent, #5ab88a, transparent);
    }

    .btn-dont-know:hover {
      background: linear-gradient(135deg, rgba(60, 180, 120, 0.16), rgba(40, 140, 90, 0.10));
      border-color: rgba(60, 180, 120, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(60, 180, 120, 0.08);
    }

    .action-buttons button:active {
      transform: translateY(0px) scale(0.97);
    }

    /* ===== 統計資訊 — 像魔法部的紀錄 ===== */
    .stats {
      display: flex;
      justify-content: center;
      gap: 28px;
      padding-top: 14px;
      border-top: 1px solid rgba(212, 175, 55, 0.06);
      font-size: 13px;
      color: #7870a0;
    }

    .stats span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stats .stat-number {
      font-weight: 700;
      color: #b8a8d0;
      font-family: 'Playfair Display', serif;
      font-size: 15px;
    }

    /* ===== 全部學完 — 慶祝畫面 ===== */
    .congrats-message {
      display: none;
      text-align: center;
      padding: 36px 20px 24px;
    }

    .congrats-message .emoji {
      font-size: 64px;
      margin-bottom: 12px;
      display: block;
      animation: celebrateBounce 1s ease-in-out infinite;
    }

    @keyframes celebrateBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-8px) scale(1.05); }
    }

    .congrats-message h2 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #f0e6a0, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .congrats-message p {
      color: #8880b0;
      font-size: 15px;
      line-height: 1.6;
    }

    .congrats-message .reset-btn {
      margin-top: 24px;
      padding: 12px 36px;
      border: 1px solid rgba(212, 175, 55, 0.15);
      background: rgba(212, 175, 55, 0.06);
      color: #f0e6a0;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      font-family: 'Inter', sans-serif;
    }

    .congrats-message .reset-btn:hover {
      background: rgba(212, 175, 55, 0.12);
      border-color: rgba(212, 175, 55, 0.3);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(212, 175, 55, 0.08);
    }

    /* ===== 響應式調整 ===== */
    @media (max-width: 480px) {
      .container {
        padding: 24px 16px;
        border-radius: 22px;
      }
      .header h1 {
        font-size: 19px;
      }
      .action-buttons button {
        font-size: 14px;
        padding: 12px 0;
      }
      .stats {
        gap: 18px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

  <!-- ===== 飄浮魔法粒子（星星） ===== -->
  <div class="magic-particles" id="magicParticles"></div>

  <!-- ===== 左上角裝飾 ===== -->
  <div class="corner-star">✦</div>

  <div class="container" id="app">
    <!-- ===== 頂部：魔法書標題 + 分類帽下拉選單 ===== -->
    <div class="header">
      <h1>🔮 單字魔法書</h1>
      <div class="vocab-selector">
        <select id="vocabSelect">
          <option value="irregular">🔮 不規則動詞魔法</option>
          <option value="animals">🦁 奇獸飼育學</option>
          <option value="colors">🌈 變色咒語</option>
          <option value="numbers">🔢 數字占卜學</option>
          <option value="body">🦴 人體現形術</option>
          <option value="food">🍺 蜂蜜公爵</option>
          <option value="family">👨‍👩‍👧‍👦 家庭魔法</option>
          <option value="school">📚 霍格華茲日常</option>
          <option value="weather">🌤️ 天氣咒語</option>
          <option value="actions">🏃 動態魔法</option>
          <option value="adjectives">✨ 形容魔法</option>
        </select>
      </div>
    </div>

    <!-- ===== 進度條 ===== -->
    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-label">📜 魔法學習進度</span>
        <span class="progress-percent" id="progressPercent">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- ===== 魔法單字卡片 ===== -->
    <div class="card-wrapper" id="cardWrapper">
      <div class="card" id="vocabCard">
        <!-- 正面：英文 — 像咒語原文 -->
        <div class="card-face card-front">
          <span class="card-lang-tag">English 咒語</span>
          <div class="card-word en" id="wordEn">Cat</div>
          <div class="card-hint">👆 點擊施展咒語</div>
        </div>
        <!-- 背面：中文 — 像翻譯咒 -->
        <div class="card-face card-back">
          <span class="card-lang-tag">中文魔法</span>
          <div class="card-word zh" id="wordZh">貓</div>
          <div class="card-hint">👆 點擊變回原形</div>
        </div>
        <!-- 小喇叭語音按鈕 -->
        <button class="speak-btn" id="speakBtn" title="朗讀咒語" aria-label="朗讀咒語">🔊</button>
      </div>
    </div>

    <div class="tap-hint">✨ 點擊卡片施展翻轉咒 ✨</div>

    <!-- ===== 咒語按鈕 ===== -->
    <div class="action-buttons">
      <button class="btn-know" id="btnKnow">🪄 學會了！</button>
      <button class="btn-dont-know" id="btnDontKnow">📖 再練練</button>
    </div>

    <!-- ===== 魔法部統計 ===== -->
    <div class="stats">
      <span>📚 咒語總數 <span class="stat-number" id="totalCount">0</span></span>
      <span>🪄 已學會 <span class="stat-number" id="knownCount">0</span></span>
      <span>📖 待複習 <span class="stat-number" id="remainingCount">0</span></span>
    </div>

    <!-- ===== 全部完成慶祝 ===== -->
    <div class="congrats-message" id="congratsMessage">
      <span class="emoji">🏆</span>
      <h2>出色的魔法 feat！</h2>
      <p>你已經學會這個分類的所有咒語了！<br>梅林爵士團勳章頒發給你 🎖️</p>
      <button class="reset-btn" id="resetBtn">🔄 重新施展魔法</button>
    </div>
  </div>

  <script>
  // ===================================================================
  //  第一部份：國小英文單字庫（哈利波特主題分類）
  //  每個分類就像霍格華茲的一門課 🧙‍♂️
  // ===================================================================

  /**
   * 單字庫總表，key 是下拉選單的 value。
   * 每個單字包含：
   *   - en   : 英文單字（國小程度，簡單常用）
   *   - zh   : 中文解釋
   *   - hint : 額外的小提示（幫助小朋友記憶）
   */
  const VOCABULARY = {
    irregular: [
      { en: 'abide', zh: '遵守／忍受', hint: '過去式 abided / abode · 過去分詞 abided / abode' },
      { en: 'arise', zh: '出現／升起', hint: '過去式 arose · 過去分詞 arisen' },
      { en: 'awake', zh: '醒來', hint: '過去式 awoke · 過去分詞 awoken' },

  // ===================================================================
  //  第二部份：魔法應用程式狀態管理
  // ===================================================================

  /** 當前選中的單字分類名稱（對應 VOCABULARY 的 key） */
  let currentCategory = 'irregular';

  /** 當前分類的所有單字 */
  let currentWords = [];

  /**
   * 學習狀態記錄。
   * 結構：{ "英文單字": "known" 或 "unknown" }
   *   - known   : 按下「學會了！」
   *   - unknown : 按下「再練練」
   * 不在物件中 = 還沒學過
   */
  let learningState = {};

  /** 當前顯示的單字索引 */
  let currentIndex = 0;

  // ===== DOM 元素快取 =====
  const dom = {
    vocabSelect:       document.getElementById('vocabSelect'),
    wordEn:            document.getElementById('wordEn'),
    wordZh:            document.getElementById('wordZh'),
    card:              document.getElementById('vocabCard'),
    cardWrapper:       document.getElementById('cardWrapper'),
    progressFill:      document.getElementById('progressFill'),
    progressPercent:   document.getElementById('progressPercent'),
    btnKnow:           document.getElementById('btnKnow'),
    btnDontKnow:       document.getElementById('btnDontKnow'),
    speakBtn:          document.getElementById('speakBtn'),
    totalCount:        document.getElementById('totalCount'),
    knownCount:        document.getElementById('knownCount'),
    remainingCount:    document.getElementById('remainingCount'),
    congratsMessage:   document.getElementById('congratsMessage'),
    resetBtn:          document.getElementById('resetBtn'),
  };

  // ===================================================================
  //  第三部份：核心魔法函式
  // ===================================================================

  /**
   * 切換單字分類（像分類帽決定你今天要學哪一門課）
   * @param {string} category - 分類名稱
   */
  function switchCategory(category) {
    currentCategory = category;
    // 複製單字陣列，避免修改到原始資料
    currentWords = [...VOCABULARY[category]];
    // 重置學習狀態
    learningState = {};
    currentIndex = 0;
    // 隱藏恭喜畫面
    dom.congratsMessage.style.display = 'none';
    dom.card.style.display = '';
    document.querySelector('.tap-hint').style.display = '';
    document.querySelector('.action-buttons').style.display = '';
    // 顯示第一個單字
    showWord(currentIndex);
    // 更新進度條與統計
    updateProgress();
  }

  /**
   * 顯示指定位置的第幾個單字
   * @param {number} index - 單字的索引
   */
  function showWord(index) {
    if (index < 0 || index >= currentWords.length) return;

    const word = currentWords[index];
    dom.wordEn.textContent = word.en;
    dom.wordZh.textContent = word.zh;

    // 卡片回到正面（英文面）
    dom.card.classList.remove('flipped');
  }

  /**
   * 施展翻轉咒 — 卡片 180 度翻轉，顯示另一面
   * 這就像把單字從英文變成中文 ✨
   */
  function toggleCard() {
    dom.card.classList.toggle('flipped');
    // 翻轉時讓卡片外框發出微光
    dom.cardWrapper.classList.add('glowing');
    setTimeout(() => {
      dom.cardWrapper.classList.remove('glowing');
    }, 700);
  }

  /**
   * 按下「學會了！」— 把這個咒語標記為已學會
   * 就像妙麗把咒語記到腦海裡 📝
   */
  function handleKnow() {
    const word = currentWords[currentIndex];
    if (!word) return;

    // 把這個單字標記為「學會了」
    learningState[word.en] = 'known';
    // 前進到下一個還沒學會的單字
    advanceToNext();
    // 更新進度條
    updateProgress();
  }

  /**
   * 按下「再練練」— 把這個單字放到待複習清單
   * 就像奈威需要再多練習幾次咒語 🪄
   */
  function handleDontKnow() {
    const word = currentWords[currentIndex];
    if (!word) return;

    // 如果之前標記為「學會了」，現在取消（表示其實還不太熟）
    if (learningState[word.en] === 'known') {
      delete learningState[word.en];
    }
    // 標記為「再練練」
    learningState[word.en] = 'unknown';
    // 前進到下一個單字
    advanceToNext();
    // 更新進度條
    updateProgress();
  }

  /**
   * 前進到下一個還沒學會的單字
   * 如果全部學會了，就顯示慶祝畫面 🏆
   */
  function advanceToNext() {
    let nextIndex = currentIndex + 1;

    // 往後找第一個「還沒學會」的單字
    while (nextIndex < currentWords.length) {
      if (learningState[currentWords[nextIndex].en] !== 'known') {
        break;
      }
      nextIndex++;
    }

    if (nextIndex < currentWords.length) {
      currentIndex = nextIndex;
      showWord(currentIndex);
    } else {
      // 檢查是不是真的全部學會了
      const allLearned = currentWords.every(w => learningState[w.en] === 'known');
      if (allLearned) {
        showCongrats();
      } else {
        // 安全機制：如果還有沒學會的但沒找到，顯示最後一個
        currentIndex = currentWords.length - 1;
        showWord(currentIndex);
      }
    }
  }

  /**
   * 太棒了！全部學會了，顯示慶祝畫面 🎉🏆🎉
   */
  function showCongrats() {
    dom.congratsMessage.style.display = 'block';
    dom.card.style.display = 'none';
    document.querySelector('.tap-hint').style.display = 'none';
    document.querySelector('.action-buttons').style.display = 'none';
  }

  /**
   * 更新魔法進度條 + 統計數字
   * 進度條會閃閃發光 ✨
   */
  function updateProgress() {
    const total = currentWords.length;
    const known = currentWords.filter(w => learningState[w.en] === 'known').length;
    const remaining = currentWords.filter(w => learningState[w.en] === 'unknown').length;
    const percent = total > 0 ? Math.floor((known / total) * 100) : 0;

    dom.progressFill.style.width = `${percent}%`;
    dom.progressPercent.textContent = `${percent}%`;

    dom.totalCount.textContent = total;
    dom.knownCount.textContent = known;
    dom.remainingCount.textContent = remaining;
  }

  // ===================================================================
  //  第四部份：🔊 語音朗讀 — 讓 Mac 用美式發音唸咒語
  //  使用瀏覽器原生的 SpeechSynthesis API，不需要網路也不用抓音檔
  // ===================================================================

  /**
   * 用標準美式發音朗讀指定的英文單字
   *   - 語速調慢一點 (0.85) 讓小朋友聽得清楚
   *   - 設定為美式英文 (en-US)
   *
   * @param {string} text - 要朗讀的英文單字
   */
  function speakText(text) {
    // 檢查瀏覽器有沒有支援語音功能
    if (!window.speechSynthesis) {
      console.warn('⚠️ 這個瀏覽器不支援語音朗讀喔～');
      return;
    }

    // 建立一個「朗讀任務」，告訴瀏覽器要唸什麼
    const utterance = new SpeechSynthesisUtterance(text);

    // 設定成美式發音（en-US）
    utterance.lang = 'en-US';

    // 語速 0.85，比正常慢一點，小朋友更容易聽清楚
    utterance.rate = 0.85;

    // 音調保持正常
    utterance.pitch = 1.0;

    // 音量最大聲
    utterance.volume = 1.0;

    // 語音開始時，讓小喇叭按鈕亮起來動畫
    utterance.onstart = () => {
      dom.speakBtn.classList.add('speaking');
    };

    // 語音結束時，關閉動畫
    utterance.onend = () => {
      dom.speakBtn.classList.remove('speaking');
    };

    // 如果出錯了也要關閉動畫
    utterance.onerror = () => {
      dom.speakBtn.classList.remove('speaking');
    };

    // 開始朗讀！
    window.speechSynthesis.speak(utterance);
  }

  // ===================================================================
  //  第五部份：創造飄浮的魔法星星 ✨
  //  這些小星星會在背景飄來飄去，像霍格華茲大廳的魔法天花板
  // ===================================================================

  /**
   * 產生飄浮的星星粒子，讓畫面更有魔法感。
   * 每個星星都會從底部慢慢飄到頂部。
   */
  function createMagicParticles() {
    const container = document.getElementById('magicParticles');
    const count = 30;  // 30 顆星星

    for (let i = 0; i < count; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';

      // 隨機設定每個星星的大小、位置、飄浮速度
      const size = Math.random() * 3 + 2;        // 2~5 像素
      const left = Math.random() * 100;           // 水平位置 0~100%
      const duration = Math.random() * 10 + 15;   // 飄浮時間 15~25 秒
      const delay = Math.random() * 20;           // 延遲開始 0~20 秒
      const opacity = Math.random() * 0.5 + 0.2;  // 亮度 0.2~0.7

      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;
      particle.style.left = `${left}%`;
      particle.style.animationDuration = `${duration}s`;
      particle.style.animationDelay = `${delay}s`;
      particle.style.opacity = opacity;

      // 偶爾讓星星是金色或銀色
      if (Math.random() > 0.7) {
        particle.style.background = '#d4af37';
        particle.style.boxShadow = '0 0 8px 3px rgba(212, 175, 55, 0.3)';
      }

      container.appendChild(particle);
    }
  }

  // 一進頁面就開始飄星星 ✨
  createMagicParticles();

  // ===================================================================
  //  第六部份：事件綁定 — 把按鈕跟功能連起來
  // ===================================================================

  /**
   * 🎩 分類帽下拉選單：切換單字分類
   */
  dom.vocabSelect.addEventListener('change', function () {
    switchCategory(this.value);
  });

  /**
   * 🃏 點擊卡片施展翻轉咒
   */
  dom.card.addEventListener('click', function (e) {
    // 如果點到的是語音按鈕，不要翻轉卡片
    if (e.target.closest('.speak-btn')) return;
    toggleCard();
  });

  /**
   * 🔊 語音朗讀按鈕：唸出當前的英文單字
   */
  dom.speakBtn.addEventListener('click', function (e) {
    // 防止同時觸發卡片翻轉
    e.stopPropagation();

    const word = currentWords[currentIndex];
    if (word) {
      speakText(word.en);
    }
  });

  /**
   * 🪄 學會了！按鈕
   */
  dom.btnKnow.addEventListener('click', handleKnow);

  /**
   * 📖 再練練按鈕
   */
  dom.btnDontKnow.addEventListener('click', handleDontKnow);

  /**
   * 🔄 重新學習按鈕（重置當前的分類）
   */
  dom.resetBtn.addEventListener('click', function () {
    learningState = {};
    currentIndex = 0;
    dom.congratsMessage.style.display = 'none';
    dom.card.style.display = '';
    document.querySelector('.tap-hint').style.display = '';
    document.querySelector('.action-buttons').style.display = '';
    showWord(currentIndex);
    updateProgress();
  });

  /**
   * ⌨️ 鍵盤快捷鍵（方便大人幫小朋友操作）
   *   空白鍵 / Enter : 翻轉卡片
   *   A / a          : 學會了！
   *   S / s          : 再練練
   *   左 / 右方向鍵  : 上下一個單字（不影響學習狀態）
   */
  document.addEventListener('keydown', function (e) {
    // 如果正在打字，不要觸發快捷鍵
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

    switch (e.key) {
      case ' ':
      case 'Enter':
        e.preventDefault();
        toggleCard();
        break;
      case 'a':
      case 'A':
        handleKnow();
        break;
      case 's':
      case 'S':
        handleDontKnow();
        break;
      case 'ArrowLeft':
        if (currentIndex > 0) {
          currentIndex--;
          showWord(currentIndex);
          updateProgress();
        }
        break;
      case 'ArrowRight':
        if (currentIndex < currentWords.length - 1) {
          currentIndex++;
          showWord(currentIndex);
          updateProgress();
        }
        break;
    }
  });

  // ===================================================================
  //  第七部份：初始化 — 一打開頁面就開始魔法學習！
  // ===================================================================

  /**
   * 頁面載入後，預設顯示「奇獸飼育學（動物）」分類。
   * 就像新生入學第一年先學簡單的咒語一樣 🧙‍♂️
   */
  switchCategory('irregular');

  /**
   * 第一次點擊頁面時，預先載入語音系統。
   * 這是因為有些瀏覽器需要使用者先點一下才能使用語音功能。
   */
  document.addEventListener('click', function initVoices() {
    if (window.speechSynthesis) {
      window.speechSynthesis.getVoices();
    }
    document.removeEventListener('click', initVoices);
  }, { once: true });
  </script>
